<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>為替 & BTC ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1923;
    color: #e0e0e0;
    padding: 12px;
  }
  h1 {
    text-align: center;
    font-size: 1.2rem;
    padding: 8px 0;
    color: #4fc3f7;
  }
  .period-selector {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .period-selector button {
    background: #1e2d3d;
    color: #90caf9;
    border: 1px solid #2a3f52;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .period-selector button.active {
    background: #1565c0;
    color: #fff;
    border-color: #1976d2;
  }
  .card {
    background: #1a2733;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 14px;
    border: 1px solid #2a3f52;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #b0bec5;
  }
  .card-price {
    font-size: 1.1rem;
    font-weight: 700;
  }
  .price-up { color: #66bb6a; }
  .price-down { color: #ef5350; }
  .price-neutral { color: #90caf9; }
  .chart-container {
    position: relative;
    height: 180px;
  }
  .loading {
    text-align: center;
    color: #607d8b;
    padding: 60px 0;
    font-size: 0.9rem;
  }
  .error {
    text-align: center;
    color: #ef5350;
    padding: 10px;
    font-size: 0.85rem;
  }
  .updated {
    text-align: center;
    font-size: 0.75rem;
    color: #546e7a;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>為替 & BTC ダッシュボード</h1>

<div class="period-selector">
  <button data-days="7">1W</button>
  <button data-days="30" class="active">1M</button>
  <button data-days="90">3M</button>
  <button data-days="365">1Y</button>
</div>

<div id="app">
  <div class="loading" id="loading">データを取得中...</div>
</div>

<div class="updated" id="updated"></div>

<script>
const CHARTS = {};
let currentDays = 30;

const PAIRS = [
  { id: 'btcusd', title: 'BTC / USD', prefix: '$', decimals: 0 },
  { id: 'usdjpy', title: 'USD / JPY', prefix: '¥', decimals: 2 },
  { id: 'thbusd', title: 'THB / USD', prefix: '$', decimals: 4 },
  { id: 'thbjpy', title: 'THB / JPY', prefix: '¥', decimals: 3 },
];

function formatDate(d) {
  return d.toISOString().split('T')[0];
}

async function fetchBTC(days) {
  const res = await fetch(
    `https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${days}`
  );
  if (!res.ok) throw new Error('BTC API error');
  const data = await res.json();
  return data.prices.map(([ts, price]) => ({
    date: new Date(ts),
    value: price,
  }));
}

async function fetchForex(days) {
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - days);
  const url = `https://api.frankfurter.app/${formatDate(start)}..${formatDate(end)}?from=USD&to=JPY,THB`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Forex API error');
  const data = await res.json();

  const usdjpy = [];
  const thbusd = [];
  const thbjpy = [];

  for (const [dateStr, rates] of Object.entries(data.rates)) {
    const date = new Date(dateStr);
    const jpy = rates.JPY;
    const thb = rates.THB;
    if (jpy) usdjpy.push({ date, value: jpy });
    if (thb) {
      thbusd.push({ date, value: 1 / thb });
      if (jpy) thbjpy.push({ date, value: jpy / thb });
    }
  }

  return { usdjpy, thbusd, thbjpy };
}

function getColor(data) {
  if (data.length < 2) return '#90caf9';
  return data[data.length - 1].value >= data[0].value ? '#66bb6a' : '#ef5350';
}

function createCard(pair) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${pair.id}`;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">${pair.title}</span>
      <span class="card-price price-neutral" id="price-${pair.id}">--</span>
    </div>
    <div class="chart-container">
      <canvas id="chart-${pair.id}"></canvas>
    </div>
  `;
  return card;
}

function renderChart(pair, data) {
  const color = getColor(data);
  const latest = data[data.length - 1]?.value;
  const first = data[0]?.value;

  const priceEl = document.getElementById(`price-${pair.id}`);
  if (latest != null) {
    const formatted = pair.prefix + latest.toLocaleString(undefined, {
      minimumFractionDigits: pair.decimals,
      maximumFractionDigits: pair.decimals,
    });
    const pct = first ? (((latest - first) / first) * 100).toFixed(2) : '0.00';
    const sign = pct >= 0 ? '+' : '';
    priceEl.textContent = `${formatted} (${sign}${pct}%)`;
    priceEl.className = 'card-price ' + (latest >= first ? 'price-up' : 'price-down');
  }

  const ctx = document.getElementById(`chart-${pair.id}`).getContext('2d');

  if (CHARTS[pair.id]) {
    CHARTS[pair.id].data.labels = data.map(d => d.date);
    CHARTS[pair.id].data.datasets[0].data = data.map(d => d.value);
    CHARTS[pair.id].data.datasets[0].borderColor = color;
    CHARTS[pair.id].data.datasets[0].backgroundColor = color + '18';
    CHARTS[pair.id].update('none');
    return;
  }

  CHARTS[pair.id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        data: data.map(d => d.value),
        borderColor: color,
        backgroundColor: color + '18',
        borderWidth: 2,
        pointRadius: 0,
        pointHitRadius: 10,
        fill: true,
        tension: 0.3,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'yyyy/MM/dd' },
          ticks: { color: '#546e7a', maxTicksLimit: 5, font: { size: 10 } },
          grid: { color: '#1e2d3d' },
        },
        y: {
          ticks: {
            color: '#546e7a',
            font: { size: 10 },
            callback: v => pair.prefix + v.toLocaleString(),
          },
          grid: { color: '#1e2d3d' },
        },
      },
      interaction: { intersect: false, mode: 'index' },
    },
  });
}

async function loadAll(days) {
  const app = document.getElementById('app');
  const loading = document.getElementById('loading');
  if (loading) loading.textContent = 'データを取得中...';

  try {
    const [btcData, forexData] = await Promise.all([
      fetchBTC(days),
      fetchForex(days),
    ]);

    if (loading) {
      app.innerHTML = '';
      PAIRS.forEach(p => app.appendChild(createCard(p)));
    }

    const allData = {
      btcusd: btcData,
      usdjpy: forexData.usdjpy,
      thbusd: forexData.thbusd,
      thbjpy: forexData.thbjpy,
    };

    PAIRS.forEach(p => renderChart(p, allData[p.id]));

    document.getElementById('updated').textContent =
      '最終更新: ' + new Date().toLocaleString('ja-JP');

  } catch (e) {
    console.error(e);
    if (loading) {
      loading.innerHTML = `<span class="error">データ取得に失敗しました。しばらく待ってからリロードしてください。</span>`;
    } else {
      const err = document.createElement('div');
      err.className = 'error';
      err.textContent = 'データ更新に失敗しました: ' + e.message;
      app.prepend(err);
    }
  }
}

document.querySelectorAll('.period-selector button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.period-selector .active')?.classList.remove('active');
    btn.classList.add('active');
    currentDays = parseInt(btn.dataset.days);
    loadAll(currentDays);
  });
});

loadAll(currentDays);
</script>
</body>
</html>
